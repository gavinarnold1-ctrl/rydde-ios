name: Rydde
options:
  bundleIdPrefix: app.rydde
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  Rydde:
    type: application
    platform: iOS
    sources:
      - Rydde
    info:
      path: Rydde/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rydde.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Rydde/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Rydde/Rydde.entitlements
